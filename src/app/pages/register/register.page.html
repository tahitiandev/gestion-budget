<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Inscription</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="auth-container">
    <div class="auth-page">
      <ion-icon name="person-add-outline" class="auth-logo"></ion-icon>
      <div class="auth-title">Créer un compte</div>
      <div class="auth-subtitle">Inscrivez-vous pour commencer</div>

      <div class="auth-form">
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input type="email" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Mot de passe</ion-label>
          <ion-input type="password" [(ngModel)]="password"></ion-input>
        </ion-item>

        <ion-text color="danger" *ngIf="errorMessage">
          <p class="ion-padding-start">{{ errorMessage }}</p>
        </ion-text>

        <ion-button expand="full" class="ion-margin-top" (click)="register()">
          S'inscrire
        </ion-button>

        <ion-button expand="full" fill="clear" routerLink="/login">
          Déjà inscrit ? Se connecter
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
