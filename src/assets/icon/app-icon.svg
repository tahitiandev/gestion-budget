<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Euro symbol -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="300" font-weight="bold" fill="white" text-anchor="middle">€</text>
  <!-- Small wallet icon top-right -->
  <rect x="320" y="80" width="120" height="90" rx="16" fill="rgba(255,255,255,0.3)"/>
  <rect x="340" y="100" width="80" height="24" rx="8" fill="rgba(255,255,255,0.5)"/>
</svg>
