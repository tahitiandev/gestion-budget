<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Paramètres</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Apparence -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Apparence</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-icon [name]="darkMode ? 'moon' : 'sunny-outline'" slot="start"></ion-icon>
        <ion-label>Mode sombre</ion-label>
        <ion-toggle [(ngModel)]="darkMode" (ionChange)="toggleDarkMode()"></ion-toggle>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <!-- Catégories de dépenses -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Catégories de dépenses</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-reorder-group [disabled]="false" (ionItemReorder)="reorderCategories('depense', $event)">
          <ion-item *ngFor="let cat of categories.depense">
            <ion-icon [name]="isProtected(cat) ? 'swap-horizontal-outline' : 'pricetag-outline'" slot="start" color="danger"></ion-icon>
            <ion-label>{{ getCategoryLabel(cat) }}</ion-label>
            <ion-button *ngIf="!isProtected(cat)" slot="end" fill="clear" color="danger" (click)="removeCategory('depense', cat)">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-button>
            <ion-reorder slot="end"></ion-reorder>
          </ion-item>
        </ion-reorder-group>
      </ion-list>

      <ion-item>
        <ion-label position="floating">Nouvelle catégorie</ion-label>
        <ion-input [(ngModel)]="newDepense" (keyup.enter)="addDepenseCategory()"></ion-input>
      </ion-item>
      <ion-button expand="full" size="small" class="ion-margin-top" (click)="addDepenseCategory()" [disabled]="!newDepense.trim()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Ajouter
      </ion-button>
    </ion-card-content>
  </ion-card>

  <!-- Catégories d'apports -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Catégories d'apports</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-reorder-group [disabled]="false" (ionItemReorder)="reorderCategories('apport', $event)">
          <ion-item *ngFor="let cat of categories.apport">
            <ion-icon name="pricetag-outline" slot="start" color="success"></ion-icon>
            <ion-label>{{ cat }}</ion-label>
            <ion-button slot="end" fill="clear" color="danger" (click)="removeCategory('apport', cat)">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-button>
            <ion-reorder slot="end"></ion-reorder>
          </ion-item>
        </ion-reorder-group>
      </ion-list>

      <ion-item>
        <ion-label position="floating">Nouvelle catégorie</ion-label>
        <ion-input [(ngModel)]="newApport" (keyup.enter)="addApportCategory()"></ion-input>
      </ion-item>
      <ion-button expand="full" size="small" class="ion-margin-top" (click)="addApportCategory()" [disabled]="!newApport.trim()">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Ajouter
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
